name: Auto Blog

on:
  schedule:
    - cron: '0 6 */2 * *'  # Every 2 days 6am UTC
  workflow_dispatch:  # allows manual trigger

jobs:
  generate-article:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Generate article
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: node scripts/generate-article.js

      - name: Commit and push
        run: |
          git config user.name "Frank"
          git config user.email "support@studioonthemountain.com"
          git add public/articles.json
          git commit -m "Auto-blog: new article $(date +%Y-%m-%d)" || exit 0
          git push
